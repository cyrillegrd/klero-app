workflows:
  ios-workflow:
    name: Klero iOS

    environment:
      xcode: latest
      node: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cyrilleguillard.klero

    scripts:
      - npm install
      - npm run build
      - npx cap sync ios
      - xcode-project use-profiles
      - xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth:
          api_key: Codemagic
        submit_to_testflight: true